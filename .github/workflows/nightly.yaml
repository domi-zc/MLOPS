name: Nightly Pipeline Run

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.monitor_step.outputs.drift_detected }}

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      GCS_ACCESS_KEY: ${{ secrets.GCS_ACCESS_KEY }}
      GCS_SECRET_KEY: ${{ secrets.GCS_SECRET_KEY }}
      GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
      STORAGE_MODE: ${{ vars.STORAGE_MODE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Feature Pipeline
        run: make feature-pipeline

      - name: Run Monitoring Pipeline
        id: monitor_step
        run: make monitoring-pipeline

  trigger-emergency-sweep:
    needs: run-pipeline
    if: needs.run-pipeline.outputs.drift_detected == 'true'
    uses: ./.github/workflows/sweep.yaml
    secrets: inherit