name: Hyperparameter Sweep Training

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  rescue-model:
    runs-on: ubuntu-latest

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      GCS_ACCESS_KEY: ${{ secrets.GCS_ACCESS_KEY }}
      GCS_SECRET_KEY: ${{ secrets.GCS_SECRET_KEY }}
      GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
      STORAGE_MODE: ${{ vars.STORAGE_MODE }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v3

      - name: Run Sweep Training
        run: make training-pipeline ARGS="--sweep --count 10"